<div class="flex flex-col h-full">
    <div class="mb-5 ml-5 w-full max-w-md">
      <!-- titulo -->
      <title-component [title]="'Presupuesto'"/>
    </div>
    <!-- contenido -->
    <div class="mx-40">
    <budget-component (selectBudget)="onSelectBudget($event)"></budget-component>
    </div>

  <!-- Dialog with selected budget lists -->
  <dialog-form
    [isVisible]="isTableVisible"
    [title]="'Detalles del presupuesto'"
    [width]="'800px'"
    [height]="'600px'"
    (closeDialog)="closeTableDialog()"
  >
    <div class="p-4">
      <!--? Tabla  para el budget category -->
      <budgets-table-history
        [Data]="selectedBudgetLists()"
        (edit)="OnEditIncomeById($event)"
        (delete)="OnDeteleid($event)"
      ></budgets-table-history>
    </div>
  </dialog-form>

</div>
